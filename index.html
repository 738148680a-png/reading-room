<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F7F5F3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>共读书房</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      body { font-family:'SF Pro Text','PingFang SC',-apple-system,'Noto Sans SC',sans-serif; overscroll-behavior:none; }
      input,textarea,button { font-family:inherit; }
      .docx-content p { margin-bottom: 1em; }
      .docx-content strong, .docx-content b { font-weight: 700; }
      .docx-content em, .docx-content i { font-style: italic; }
      .docx-content u { text-decoration: underline; }
      .docx-content h1,.docx-content h2,.docx-content h3,.docx-content h4 { font-weight:700; margin:0.8em 0 0.4em; }
      .docx-content h1 { font-size:1.4em; } .docx-content h2 { font-size:1.2em; } .docx-content h3 { font-size:1.1em; }
      .docx-content table { width:100%; border-collapse:collapse; margin:0.8em 0; font-size:0.9em; }
      .docx-content td,.docx-content th { border:1px solid rgba(0,0,0,0.1); padding:6px 8px; }
      .docx-content ul,.docx-content ol { padding-left:1.5em; margin:0.5em 0; }
      .docx-content img { max-width:100%; height:auto; border-radius:8px; margin:0.5em 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
